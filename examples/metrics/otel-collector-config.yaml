#
# Reference OTel collector config for inorbit-connector fleets exporting to
# GCP Cloud Monitoring. See README.md in this directory for the rules each
# block encodes; do not loosen them without reading that file first.

receivers:
  prometheus:
    config:
      global:
        scrape_interval: 30s
        scrape_timeout: 10s
      scrape_configs:
        - job_name: inorbit_connectors
          # Preserve target_info series labels so connector-side resource
          # attributes (notably inorbit_connector_id) surface as OTel
          # resource attributes for the `resource` processor below.
          honor_labels: true
          metrics_path: /metrics
          file_sd_configs:
            - files: ['/var/run/inorbit-metrics/*.json']
              refresh_interval: 30s
          # Drop-only relabels are safe. Do NOT add a rule that writes
          # `__name__` — see Rule 1 in README.md.
          metric_relabel_configs:
            - source_labels: [__name__]
              regex: 'python_.*|process_.*'
              action: drop

processors:
  # Bound RSS so backpressure from the metric backend can't balloon it.
  memory_limiter:
    check_interval: 2s
    limit_percentage: 80
    spike_limit_percentage: 20

  # Pin the prometheus_target Monitored Resource fields. The
  # googlemanagedprometheus exporter's MR mapping is hardcoded to these
  # standard OTel attributes:
  #   prometheus_target.location  <- cloud.availability_zone | cloud.region
  #                                  (MUST be a real GCP region/zone or
  #                                  Cloud Monitoring rejects the write)
  #   prometheus_target.cluster   <- k8s.cluster.name   (unset here)
  #   prometheus_target.namespace <- k8s.namespace.name (unset here)
  #   prometheus_target.job       <- service.name
  #   prometheus_target.instance  <- service.instance.id
  resource:
    attributes:
      - {key: service.name,        value: inorbit_connector,       action: upsert}
      - {key: cloud.region,        value: us-central1,             action: upsert}
      - {key: service.instance.id, from_attribute: inorbit_connector_id,   action: upsert}
      # Promote the connector_type tag the framework already attaches as
      # a metric label so cross-connector dashboards can group / filter
      # by it without inspecting metric names.
      - {key: connector_type,      from_attribute: inorbit_connector_type, action: upsert}
      # Per-customer label. Any other resource attribute you want as a
      # series-key must be added here AND matched under resource_filters.
      - {key: customer, value: CHANGEME, action: upsert}

  batch:
    send_batch_size: 200
    send_batch_max_size: 500
    timeout: 10s

exporters:
  # Writes to Cloud Monitoring as the PROMETHEUS metric type
  # (`prometheus.googleapis.com/inorbit_connector_*`). Compared to the
  # Custom type that the plain `googlecloud` exporter produces, the
  # per-descriptor caps go from 30 to 200 labels and from 10K to 25K
  # descriptors per project, the active-series cap per descriptor goes
  # from 200K to 1M, and the metrics become queryable with PromQL in
  # both the Cloud Monitoring console and Grafana (via the Managed
  # Service for Prometheus datasource).
  #
  # The exporter owns the prefix (not configurable) and appends a type
  # suffix to each metric name on the descriptor
  # (`.../inorbit_connector_up/gauge`,
  #  `.../inorbit_connector_execution_loop_ticks_total/counter`, ...).
  # In PromQL you still query by the bare wire name
  # (`inorbit_connector_up`); the suffix only shows up in descriptor
  # listings and the console metric selector.
  #
  # Naming model on the wire: every framework metric exports under the
  # constant `inorbit_connector_*` name; the connector type rides as a
  # label (promoted below). Per-process isolation comes from
  # `inorbit_connector_id` (= service.instance.id = prometheus_target
  # `instance`), unique per connector process per host.
  #
  # Pricing note: Prometheus-type metrics bill by SAMPLES ingested,
  # not bytes — run a short staging soak and check the projected cost
  # before fleet rollout.
  googlemanagedprometheus:
    project: ${env:GCP_PROJECT}
    metric:
      # Lift these resource attributes onto every series as labels, so a
      # single query can slice across connector types ("all robots
      # offline for customer=acme") AND drill into one ("MiR fleet
      # only"). The names must match the attribute keys produced by the
      # `resource` processor above.
      resource_filters:
        - regex: ^customer$
        - regex: ^connector_type$
    # Default 12s is too aggressive given hourly OAuth-refresh reconnect
    # windows; dials get canceled mid-handshake at 12s.
    timeout: 30s
    sending_queue:
      enabled: true
      # Serial sends — see Rule 2 in README.md. CUMULATIVE writes must
      # arrive monotonically per series; parallel consumers can deliver
      # older batches after newer ones during retry storms and trip the
      # per-series ordering rejection. Serial sending makes the queue
      # strictly FIFO, so retries block the next batch rather than
      # racing it.
      num_consumers: 1
      # Absorbs backpressure (OAuth refresh, NAT reconnect) without the
      # prometheus receiver dropping at enqueue time. CUMULATIVE writes
      # are self-healing across drops — the next successful write
      # carries the full running total — but we still want headroom.
      queue_size: 10000

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  telemetry:
    logs:
      level: info
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    metrics:
      receivers: [prometheus]
      processors: [memory_limiter, resource, batch]
      exporters: [googlemanagedprometheus]
